<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>분실물 관리 대시보드</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>분실물 관리 대시보드</h1>
    <span id="last-updated"></span>
  </header>

  <main>
    <!-- 요약 카드 -->
    <section class="summary-cards">
      <div class="card" id="card-total">
        <div class="card-label">전체</div>
        <div class="card-value" id="count-total">0</div>
      </div>
      <div class="card food" id="card-food">
        <div class="card-label">음식물 (1일)</div>
        <div class="card-value" id="count-food">0</div>
      </div>
      <div class="card non-food" id="card-nonfood">
        <div class="card-label">비음식물 (30일)</div>
        <div class="card-value" id="count-nonfood">0</div>
      </div>
      <div class="card valuables" id="card-valuables">
        <div class="card-label">고가품 (6개월)</div>
        <div class="card-value" id="count-valuables">0</div>
      </div>
    </section>

    <!-- AR 마스킹 뷰어 -->
    <section class="ar-section">
      <h2>AR 마스킹 뷰어</h2>
      <p class="ar-hint">폐기 기한이 지난 항목은 빨간색으로 표시됩니다.</p>
      <div class="canvas-wrapper">
        <img id="camera-snapshot" src="" alt="카메라 스냅샷" />
        <canvas id="ar-canvas"></canvas>
      </div>
      <button id="btn-refresh-ar" class="btn">AR 새로고침</button>
    </section>

    <!-- 분실물 목록 -->
    <section class="table-section">
      <div class="table-header">
        <h2>분실물 목록</h2>
        <div class="controls">
          <select id="filter-category">
            <option value="all">전체 카테고리</option>
            <option value="음식물">음식물</option>
            <option value="비음식물">비음식물</option>
            <option value="고가품">고가품</option>
          </select>
          <button id="btn-refresh" class="btn">새로고침</button>
        </div>
      </div>

      <div class="table-wrapper">
        <table id="items-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>물건명</th>
              <th>카테고리</th>
              <th>감지 시각</th>
              <th>폐기 기한</th>
              <th>D-Day</th>
              <th>상태</th>
              <th>이미지</th>
            </tr>
          </thead>
          <tbody id="items-tbody">
            <tr>
              <td colspan="8" class="loading">데이터 불러오는 중...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/ar_mask.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
